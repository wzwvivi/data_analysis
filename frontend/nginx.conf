server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # 与后端 MAX_UPLOAD_SIZE 对齐（默认 2G，可在 .env 里通过 MAX_UPLOAD_SIZE_MB 覆盖）。
    # 若目标机磁盘紧张，建议 1G~2G；Nginx 这里是总的硬上限。
    client_max_body_size 2G;
    # 请求体到达时在内存中的缓冲大小，超过就落到 client_body_temp_path。
    # 1m 是个比较稳妥的默认：既不额外占内存，也避免小请求落盘。
    client_body_buffer_size 1m;

    # 大文件上传全部显式 "流式转发" 到后端，避免 nginx 把整个请求体先缓存到
    # /var/lib/nginx/body 再转发（无 swap 的 16G 机器上这会瞬间占 1-2G 内存+磁盘）。
    # index.html 不缓存，保证发布后新版本立即生效；静态资源带 hash，浏览器会按文件名自然缓存
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
        try_files /index.html =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/parse/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    location = /api/fms-event-analysis/standalone/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    location = /api/fcc-event-analysis/standalone/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    location = /api/auto-flight-analysis/standalone/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    location = /api/compare/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    # Phase 1 back-compat（旧 /api/event-analysis 前缀保留一段时间）
    location = /api/event-analysis/standalone/upload {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
        proxy_request_buffering off;
        proxy_http_version 1.1;
    }

    location /api/ {
        proxy_pass http://backend:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 2G;
    }
}
