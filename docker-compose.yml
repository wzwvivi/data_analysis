version: "3.8"

services:
  backend:
    build: ./backend
    container_name: tsn-backend
    ports:
      - "8081:8081"
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: tsn-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
